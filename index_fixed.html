<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIVERO Studios | Offizielle Website</title>
    <style>
        /* Globale Stile & Farbpalette basierend auf dem edlen Gold-Schwarz-Logo */
        :root {
            --bg-color: #090a0f;
            --surface-color: #12141c;
            --surface-accent: #1a1d29;
            --accent-gold: #c5a059; /* Edles Gold passend zum Logo */
            --accent-gold-hover: #e0b96f;
            --text-main: #ffffff;
            --text-muted: #a2a8b9;
            --border-color: rgba(197, 160, 89, 0.15);
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Times New Roman', Georgia, serif; /* Klassischer Vibe passend zum Logo */
            line-height: 1.6;
            overflow-x: hidden;
        }

        p, span, li, a, div.role {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Header & Navigation */
        header {
            background-color: rgba(9, 10, 15, 0.95);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
        }

        .logo-img {
            height: 45px;
            width: auto;
            border: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: 4px;
        }

        .studio-name {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--text-main);
            text-transform: uppercase;
        }

        .studio-name span {
            color: var(--accent-gold);
            font-family: 'Times New Roman', serif;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 2.5rem;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.3s, transform 0.3s;
            display: inline-block;
        }

        nav a:hover {
            color: var(--accent-gold);
            transform: translateY(-1px);
        }

        /* Hero-Bereich mit geometrischen Ecken-Akzenten im Stil des Logos */
        .hero {
            position: relative;
            padding: 12rem 2rem 8rem;
            text-align: center;
            background: linear-gradient(180deg, rgba(197, 160, 89, 0.04) 0%, rgba(9, 10, 15, 0) 100%);
            max-width: 1200px;
            margin: 0 auto;
        }

        .hero-decor-tl {
            position: absolute;
            top: 4rem;
            left: 2rem;
            width: 30px;
            height: 30px;
            border-top: 2px solid var(--accent-gold);
            border-left: 2px solid var(--accent-gold);
            opacity: 0.4;
        }

        .hero-decor-br {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            width: 30px;
            height: 30px;
            border-bottom: 2px solid var(--accent-gold);
            border-right: 2px solid var(--accent-gold);
            opacity: 0.4;
        }

        .hero h1 {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-main);
        }

        .hero h1 span {
            color: var(--accent-gold);
            font-family: 'Times New Roman', serif;
        }

        .hero p {
            color: var(--text-muted);
            font-size: 1.25rem;
            max-width: 700px;
            margin: 0 auto 2.5rem;
            font-weight: 300;
        }

        .cta-button {
            display: inline-block;
            background-color: transparent;
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold);
            padding: 0.75rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            border-radius: 0;
            transition: all 0.3s ease;
        }

        .cta-button:hover {
            background-color: var(--accent-gold);
            color: var(--bg-color);
            box-shadow: 0 0 15px rgba(197, 160, 89, 0.3);
        }

        /* Sektionen Allgemein */
        section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 6rem 2rem;
        }

        h2 {
            font-size: 2.5rem;
            margin-bottom: 3.5rem;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        h2::after {
            content: '';
            display: block;
            width: 60px;
            height: 1px;
            background-color: var(--accent-gold);
            margin: 0.75rem auto 0;
        }

        /* Projekt-Bereich */
        .game-card {
            background-color: var(--surface-color);
            border-radius: 4px;
            padding: 3rem;
            border: 1px solid var(--border-color);
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 1.5rem;
        }

        .game-title h3 {
            font-size: 2.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent-gold);
        }

        .badge {
            background-color: rgba(197, 160, 89, 0.1);
            color: var(--accent-gold);
            padding: 0.5rem 1.2rem;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: 1px solid rgba(197, 160, 89, 0.2);
        }

        .game-description {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .game-features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .feature-box {
            background-color: var(--surface-accent);
            padding: 1.5rem;
            border-left: 3px solid var(--accent-gold);
        }

        .feature-box h4 {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Team-Bereich */
        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2.5rem;
        }

        .team-member {
            background-color: var(--surface-color);
            padding: 2.5rem 2rem;
            text-align: center;
            border: 1px solid var(--border-color);
            position: relative;
            transition: transform 0.3s, border-color 0.3s;
        }

        .team-member:hover {
            transform: translateY(-5px);
            border-color: rgba(197, 160, 89, 0.5);
        }

        .team-member::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            width: 10px;
            height: 10px;
            border-top: 1px solid var(--accent-gold);
            border-left: 1px solid var(--accent-gold);
            opacity: 0.3;
        }

        .team-member::after {
            content: '';
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 10px;
            height: 10px;
            border-bottom: 1px solid var(--accent-gold);
            border-right: 1px solid var(--accent-gold);
            opacity: 0.3;
        }

        .role {
            color: var(--accent-gold);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 1rem;
            letter-spacing: 1.5px;
        }

        .name {
            font-size: 1.6rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Footer & Investoren */
        footer {
            background-color: #050608;
            padding: 4rem 2rem;
            text-align: center;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .footer-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .investors-section {
            margin-bottom: 2.5rem;
            padding-bottom: 2.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .investors-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-gold);
            margin-bottom: 1rem;
        }

        .investors-text {
            font-style: italic;
            max-width: 600px;
            margin: 0 auto;
            color: rgba(255, 255, 255, 0.5);
        }

        .copyright {
            letter-spacing: 1px;
            font-size: 0.85rem;
        }

        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                gap: 1.5rem;
                padding: 1.5rem;
            }
            nav ul {
                gap: 1.5rem;
            }
            .hero {
                padding: 14rem 1.5rem 6rem;
            }
            .hero h1 {
                font-size: 2.8rem;
            }
            .game-card {
                padding: 2rem 1.5rem;
            }
            .hero-decor-tl, .hero-decor-br {
                display: none;
            }
        }
    </style>
</head>
<body>

        <div class="nav-container">
            <a href="#" class="logo-area">
